name: E-commerce CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Create Frontend .env for Build
        run: echo "NEXT_PUBLIC_BACKEND_URL=/api/v1" > ./HazHzel_App/.env.production

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./HazHzel_Server
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ecommerce-backend:latest

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./HazHzel_App
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ecommerce-frontend:latest

  deploy:
    name: Deploy to VPS
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Connect to VPS & Deploy
        uses: appleboy/ssh-action@v1.0.3

        env:
          FE_AUTH_SECRET: ${{ secrets.FE_AUTH_SECRET }}
          BE_MONGODB_URI: ${{ secrets.BE_MONGODB_URI }}
          BE_JWT_SECRET: ${{ secrets.BE_JWT_SECRET }}
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd /home/thanh/HazHzel-Ecommerce

            echo "AUTH_SECRET=$FE_AUTH_SECRET" > HazHzel_App/.env
            echo "NEXT_PUBLIC_BACKEND_URL=/api/v1" >> HazHzel_App/.env

            echo "PORT=8000" > HazHzel_Server/.env
            echo "MONGODB_URI=$BE_MONGODB_URI" >> HazHzel_Server/.env
            echo "JWT_SECRET=$BE_JWT_SECRET" >> HazHzel_Server/.env
            echo "JWT_ACCESS_TOKEN_EXPIRED=1000d" >> HazHzel_Server/.env

            # 2. Lấy file docker-compose.yml mới nhất về
            git pull origin main

            # 3. Kéo Image đã build sẵn từ Docker Hub về (Rất nhẹ, không tốn RAM)
            docker compose pull

            # 4. Khởi động lại các container với Image mới
            docker compose up -d --force-recreate

            # 5. Xóa hết env
            rm HazHzel_App/.env HazHzel_Server/.env
